# ================= 4. 路由规则 (Rules) =================
# 规则按从上到下的顺序匹配，匹配成功即放行或代理
rules:
  # --- 1. 防 BT 下载封号 ---
  # 拦截常见下载器和BT端口，强制走直连网络，保护代理节点
  - "PROCESS-NAME,aria2c,DIRECT"
  - "PROCESS-NAME,BitComet,DIRECT"
  - "PROCESS-NAME,qBittorrent,DIRECT"
  - "PROCESS-NAME,Transmission,DIRECT"
  - "PROCESS-NAME,utorrent,DIRECT"
  - "PROCESS-NAME,Thunder,DIRECT"
  - "PROCESS-NAME,Xunlei,DIRECT"
  - "DST-PORT,6881-6889,DIRECT"
  - "DST-PORT,51413,DIRECT"
  
  # --- 2. 局域网与双边环境（中越）本地直连 ---
  - "RULE-SET,lancidr,全局直连,no-resolve"
  - "GEOIP,LAN,全局直连,no-resolve"
  - "GEOIP,VN,全局直连,no-resolve" # 越南本地流量绝对直连，提升本地 App 体验
  
  # --- 3. 广告拦截 ---
  - "RULE-SET,reject,广告过滤"
  
  # --- 4. 自定义域名直连与特定服务分配 ---
  - "DOMAIN-SUFFIX,googleapis.cn,节点选择"
  - "DOMAIN-SUFFIX,gstatic.com,节点选择"
  - "DOMAIN-SUFFIX,xn--ngstr-lra8j.com,节点选择"
  - "DOMAIN-SUFFIX,github.io,节点选择"
  - "DOMAIN,v2rayse.com,节点选择"
  - "RULE-SET,icloud,微软服务"
  - "RULE-SET,apple,苹果服务"
  - "RULE-SET,YouTube,YouTube"
  - "RULE-SET,Netflix,Netflix"
  - "RULE-SET,bahamut,动画疯"
  - "RULE-SET,Spotify,Spotify"
  - "RULE-SET,BilibiliHMT,哔哩哔哩港澳台"
  - "RULE-SET,AI,AI"
  - "RULE-SET,TikTok,TikTok"
  - "RULE-SET,google,谷歌服务"
  - "RULE-SET,telegramcidr,电报消息,no-resolve"
  
  # --- 5. 国内服务控制 ---
  # 当人在海外时，可通过切换“国内服务”策略组让这些流量走回国节点
  - "RULE-SET,cncidr,国内服务,no-resolve"
  - "GEOSITE,CN,国内服务"
  - "GEOIP,CN,国内服务,no-resolve"
  
  # --- 6. 兜底代理规则 ---
  # 匹配常见被墙域名或海外流量，交由代理节点处理
  - "RULE-SET,proxy,节点选择"
  - "RULE-SET,gfw,节点选择"
  - "RULE-SET,tld-not-cn,节点选择"
  - "RULE-SET,applications,全局直连"
  - "RULE-SET,private,全局直连"
  - "RULE-SET,direct,全局直连"
  
  # --- 7. 最终兜底匹配 ---
  # 所有未被上面规则命中的流量，全部交由“漏网之鱼”处理
  - "MATCH,漏网之鱼"
