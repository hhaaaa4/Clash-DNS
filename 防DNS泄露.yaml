# =========================================================
# Mihomo 终极大一统引擎 (PC/手机通用 - 完美修复版)
# 核心优势：全图标UI、应用包名精准匹配、mrs极速规则、UI接管开关
# =========================================================

# --- 1. 全局基础设置 ---
bind-address: "0.0.0.0"         
mixed-port: 7890                
unified-delay: true             
find-process-mode: strict       
global-client-fingerprint: random # ✅ 已修复：强制使用随机 TLS 指纹
tcp-concurrent: true            
keep-alive-idle: 600            
keep-alive-interval: 15         

# --- 2. 缓存与 GEO 数据库更新 ---
profile:
  store-selected: true          
  store-fake-ip: true           

geodata-mode: true
geo-auto-update: true
geo-update-interval: 24         # 建议设为 24 小时，避免频繁请求
geox-url:
  geoip: https://fastly.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@release/geoip.dat
  geosite: https://fastly.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@release/geosite.dat
  mmdb: https://fastly.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@release/geoip.metadb

lan-allowed-ips:                
  - 0.0.0.0/0
  - ::/0
  - 127.0.0.1/8

# --- 3. TUN 虚拟网卡设置 (✅ 默认不写 enable，由软件 UI 界面控制开关) ---
tun:
  stack: mixed                  
  strict-route: true            
  dns-hijack: ["any:53", "tcp://any:53"] 
  mtu: 1500                     
  auto-route: true              
  auto-redirect: false          
  auto-detect-interface: true   

# --- 4. 核心 DNS 防污染设置 (极致秒开与防泄露) ---
dns:
  enable: true                  
  cache-algorithm: arc          
  listen: 0.0.0.0:1053          
  respect-rules: true           
  use-hosts: true               
  use-system-hosts: true        
  enhanced-mode: fake-ip        
  fake-ip-range: 198.18.0.1/16  
  fake-ip-filter-mode: blacklist 
  fake-ip-filter:               
    - rule-set:fakeipfilter     
    - +.gov.vn                  # 越南政务网直连
    - +.lan
    - +.local
  
  default-nameserver:
    - 223.5.5.5
    - 119.29.29.29
  
  nameserver:
    - https://1.1.1.1/dns-query
    - https://8.8.8.8/dns-query
  
  proxy-server-nameserver:
    - https://223.5.5.5/dns-query
    - https://doh.pub/dns-query
  
  nameserver-policy:
    "geosite:cn,private":       
      - https://223.5.5.5/dns-query
      - https://doh.pub/dns-query

# --- 5. 域名嗅探器 ---
sniffer:
  enable: true                  
  parse-pure-ip: true           
  sniff:
    HTTP:
      ports: [80, 8080-8880]
      override-destination: true 
    TLS:
      ports: [443, 8443]
    QUIC:
      ports: [443, 8443]        
  skip-domain:
    - "Mijia Cloud"             
    - "+.push.apple.com"        
  skip-src-address:
    - 192.168.1.0/24            
  skip-dst-address:
    - 91.105.192.0/23
    - 91.108.4.0/22
    - 91.108.8.0/21
    - 91.108.16.0/21
    - 91.108.56.0/22
    - 95.161.64.0/20
    - 149.154.160.0/20
    - 185.76.151.0/24

# --- 6. 内置节点 ---
proxies:
  # ✅ 已修复：删除了重复的 DIRECT 节点名，解决报错
  - {name: REJECT, type: reject}

# --- 7. 节点地区筛选正则 ---
FilterHK: &FilterHK '(?=.*(广港|香港|HK|Hong Kong|🇭🇰|HongKong)).*$'
FilterTW: &FilterTW '(?=.*(广台|台湾|台灣|TW|Tai Wan|🇹🇼|🇨🇳|TaiWan|Taiwan)).*$'
FilterSG: &FilterSG '(?=.*(广新|新加坡|SG|坡|狮城|🇸🇬|Singapore)).*$'
FilterUS: &FilterUS '(?=.*(广美|US|美国|纽约|波特兰|达拉斯|俄勒|凤凰城|费利蒙|洛杉|圣何塞|圣克拉|西雅|芝加|🇺🇸|United States)).*$'
FilterVN: &FilterVN '(?=.*(越|越南|VN|vn|vietnam|胡|河内)).*$'
FilterOther: &FilterOther '^(?!.*(官网|套餐|流量|异常|剩余|广港|香港|HK|Hong Kong|🇭🇰|HongKong|广台|台湾|台灣|TW|Tai Wan|🇹🇼|🇨🇳|TaiWan|Taiwan|广新|新加坡|SG|坡|狮城|🇸🇬|Singapore|广美|US|美国|纽约|波特兰|达拉斯|俄勒|凤凰城|费利蒙|洛杉|圣何塞|圣克拉|西雅|芝加|🇺🇸|United States|越|越南|VN|vn|vietnam|胡|河内)).*$'

# --- 8. 策略组基础模板与名单 ---
Select: &Select {type: select, url: 'https://www.google.com/generate_204', disable-udp: false, hidden: false, include-all: true}
UrlTest: &UrlTest {type: url-test, url: 'https://www.google.com/generate_204', disable-udp: false, hidden: true, include-all: true, interval: 120, lazy: true, tolerance: 200, timeout: 2000, max-failed-times: 3}

commonProxies: &commonProxies [ 🚀 节点选择, 香港节点, 香港-自动, 台湾节点, 台湾-自动, 新加坡节点, 新加坡-自动, 美国节点, 美国-自动, 越南节点, 越南-自动, 其他节点, 🔗 全局直连 ]
directFirstProxies: &directFirstProxies [ 🔗 全局直连, 🚀 节点选择, 台湾节点, 香港节点, 台湾-自动, 香港-自动, 其他节点 ]
nodeSelectProxies: &nodeSelectProxies [ 香港节点, 香港-自动, 台湾节点, 台湾-自动, 新加坡节点, 新加坡-自动, 美国节点, 美国-自动, 越南节点, 越南-自动, 其他节点, 🔗 全局直连 ]

# --- 9. 面板策略组 (全图标版) ---
proxy-groups:
  - {name: 🚀 节点选择, type: select, proxies: *nodeSelectProxies, icon: "https://fastly.jsdelivr.net/gh/clash-verge-rev/clash-verge-rev.github.io@main/docs/assets/icons/adjust.svg"}
  - {name: 🇻🇳 越南服务, type: select, proxies: *commonProxies, icon: "https://upload.wikimedia.org/wikipedia/commons/thumb/2/21/Flag_of_Vietnam.svg/330px-Flag_of_Vietnam.svg.png"}
  - {name: 🔍 谷歌服务, type: select, proxies: *commonProxies, icon: "https://fastly.jsdelivr.net/gh/clash-verge-rev/clash-verge-rev.github.io@main/docs/assets/icons/google.svg"}
  - {name: ▶️ YouTube, type: select, proxies: *commonProxies, icon: "https://fastly.jsdelivr.net/gh/clash-verge-rev/clash-verge-rev.github.io@main/docs/assets/icons/youtube.svg"}
  - {name: 📲 电报消息, type: select, proxies: *commonProxies, icon: "https://fastly.jsdelivr.net/gh/clash-verge-rev/clash-verge-rev.github.io@main/docs/assets/icons/telegram.svg"}
  - {name: 🤖 AI, type: select, proxies: *commonProxies, icon: "https://fastly.jsdelivr.net/gh/clash-verge-rev/clash-verge-rev.github.io@main/docs/assets/icons/chatgpt.svg"}
  - {name: 🎵 TikTok, type: select, proxies: *commonProxies, icon: "https://fastly.jsdelivr.net/gh/xiaolin-007/clash@main/icon/tiktok.svg"}
  
  - {name: 🎮 Steam, type: select, proxies: *directFirstProxies, icon: "https://fastly.jsdelivr.net/gh/clash-verge-rev/clash-verge-rev.github.io@main/docs/assets/icons/steam.svg"}
  - {name: 🎮 Epic, type: select, proxies: *directFirstProxies, icon: "https://img.icons8.com/?size=100&id=gItgZriuEvjv&format=png&color=000000"}

  - {name: Ⓜ️ 微软服务, type: select, proxies: *commonProxies, icon: "https://fastly.jsdelivr.net/gh/clash-verge-rev/clash-verge-rev.github.io@main/docs/assets/icons/microsoft.svg"}
  - {name: 🍎 苹果服务, type: select, proxies: *commonProxies, icon: "https://fastly.jsdelivr.net/gh/clash-verge-rev/clash-verge-rev.github.io@main/docs/assets/icons/apple.svg"}
  - {name: 📺 哔哩哔哩港澳台, type: select, proxies: *directFirstProxies, icon: "https://fastly.jsdelivr.net/gh/xiaolin-007/clash@main/icon/bilibili.svg"}
  - {name: 🐟 漏网之鱼, type: select, proxies: *commonProxies, icon: "https://fastly.jsdelivr.net/gh/clash-verge-rev/clash-verge-rev.github.io@main/docs/assets/icons/fish.svg"}
  
  - {name: 🛡️ 广告过滤, type: select, proxies: [REJECT, DIRECT], icon: "https://fastly.jsdelivr.net/gh/clash-verge-rev/clash-verge-rev.github.io@main/docs/assets/icons/bug.svg"}
  - {name: 🔗 全局直连, type: select, proxies: [DIRECT], icon: "https://fastly.jsdelivr.net/gh/clash-verge-rev/clash-verge-rev.github.io@main/docs/assets/icons/link.svg"}

  - {name: 香港节点, <<: *Select, filter: *FilterHK}
  - {name: 台湾节点, <<: *Select, filter: *FilterTW}
  - {name: 新加坡节点, <<: *Select, filter: *FilterSG}
  - {name: 美国节点, <<: *Select, filter: *FilterUS}
  - {name: 越南节点, <<: *Select, filter: *FilterVN}
  - {name: 其他节点, <<: *Select, filter: *FilterOther}

  - {name: 香港-自动, <<: *UrlTest, filter: *FilterHK}
  - {name: 台湾-自动, <<: *UrlTest, filter: *FilterTW}
  - {name: 新加坡-自动, <<: *UrlTest, filter: *FilterSG}
  - {name: 美国-自动, <<: *UrlTest, filter: *FilterUS}
  - {name: 越南-自动, <<: *UrlTest, filter: *FilterVN}

# --- 10. 路由规则 (网络交警) ---
rules:
  # NTP 与阻断 QUIC
  - DST-PORT,123,🔗 全局直连                                      
  - AND,((NETWORK,UDP),(DST-PORT,443),(GEOSITE,youtube|google)),REJECT 
  - DOMAIN-KEYWORD,jspoo,🔗 全局直连

  # 黑洞拦截与基础放行
  - IP-CIDR,169.254.169.254/32,REJECT,no-resolve  
  - DST-PORT,11434,REJECT                         
  - DOMAIN,t-ring-fdv2.msedge.net,REJECT,no-resolve 
  - RULE-SET,reject,🛡️ 广告过滤
  
  - IP-CIDR,223.5.5.5/32,🔗 全局直连,no-resolve
  - IP-CIDR,223.6.6.6/32,🔗 全局直连,no-resolve
  - RULE-SET,private_ip,🔗 全局直连,no-resolve           
  - RULE-SET,private_domain,🔗 全局直连
  
  - RULE-SET,speedtest_domain,🔗 全局直连                
  - RULE-SET,apple_domain,🍎 苹果服务                    
  - RULE-SET,apple_ip,🍎 苹果服务,no-resolve
  
  # 🕹️ 游戏包名直连
  - PROCESS-NAME,com.valvesoftware.android.steam.community,🔗 全局直连
  - PROCESS-NAME,com.epicgames.portal,🔗 全局直连
  - DOMAIN-KEYWORD,steam,🎮 Steam
  - DOMAIN-KEYWORD,epic,🎮 Epic

  # 🇻🇳 越南应用进程匹配
  - PROCESS-NAME,com.zing.zalo,🇻🇳 越南服务
  - PROCESS-NAME,vn.com.vng.zalopay,🇻🇳 越南服务
  - PROCESS-NAME,com.grabtaxi.passenger,🇻🇳 越南服务
  - PROCESS-NAME,com.shopee.vn,🇻🇳 越南服务
  - DOMAIN-SUFFIX,vn,🇻🇳 越南服务
  - DOMAIN-SUFFIX,zalo.me,🇻🇳 越南服务
  - DOMAIN-KEYWORD,zalo,🇻🇳 越南服务
  - DOMAIN-KEYWORD,momo.vn,🇻🇳 越南服务
  - DOMAIN-SUFFIX,gov.vn,🇻🇳 越南服务

  # 📱 常见应用包名匹配
  - PROCESS-NAME,com.android.vending,🔍 谷歌服务
  - PROCESS-NAME,com.google.android.youtube,▶️ YouTube
  - PROCESS-NAME,com.openai.chatgpt,🤖 AI
  - PROCESS-NAME,com.ss.android.ugc.trill,🎵 TikTok
  - PROCESS-NAME,org.telegram.group,📲 电报消息

  # 规则集匹配
  - RULE-SET,BilibiliHMT,📺 哔哩哔哩港澳台
  - RULE-SET,TikTok,🎵 TikTok
  - RULE-SET,ai_domain,🤖 AI
  - RULE-SET,onedrive_domain,Ⓜ️ 微软服务
  - RULE-SET,microsoft_domain,Ⓜ️ 微软服务
  - RULE-SET,telegram_ip,📲 电报消息,no-resolve
  - RULE-SET,telegram_domain,📲 电报消息
  - RULE-SET,youtube_domain,▶️ YouTube
  - RULE-SET,google_domain,🔍 谷歌服务
  - RULE-SET,google_ip,🔍 谷歌服务,no-resolve
  - DOMAIN,v2rayse.com,🚀 节点选择
  
  - RULE-SET,cn_domain,🔗 全局直连
  - RULE-SET,cn_ip,🔗 全局直连,no-resolve
  
  - RULE-SET,geolocation-!cn_domain,🚀 节点选择
  - MATCH,🐟 漏网之鱼

# --- 11. 规则集定义 (mrs极速版) ---
RuleSet_domain_yaml: &RuleSet_domain_yaml {type: http, behavior: domain, interval: 43200, format: yaml}
RuleSet_classical_yaml: &RuleSet_classical_yaml {type: http, behavior: classical, interval: 43200, format: yaml}
RuleSet_domain_mrs: &RuleSet_domain_mrs {type: http, behavior: domain, interval: 43200, format: mrs} 
RuleSet_ipcidr_mrs: &RuleSet_ipcidr_mrs {type: http, behavior: ipcidr, interval: 43200, format: mrs}

rule-providers:
  reject:
    <<: *RuleSet_domain_yaml
    url: "https://fastly.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/reject.txt"
    path: "./rule-providers/reject.yaml"
  BilibiliHMT:
    <<: *RuleSet_classical_yaml
    url: "https://fastly.jsdelivr.net/gh/xiaolin-007/clash@main/rule/BilibiliHMT.txt"
    path: "./rule-providers/BilibiliHMT.yaml"
  TikTok:
    <<: *RuleSet_classical_yaml
    url: "https://fastly.jsdelivr.net/gh/xiaolin-007/clash@main/rule/TikTok.txt"
    path: "./rule-providers/TikTok.yaml"
  fakeipfilter:
