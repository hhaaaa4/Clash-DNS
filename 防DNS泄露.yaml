# --- 统一延迟 (真延迟) ---
# 开启后，测速将综合计算 TCP握手 + TLS握手 + HTTP响应 的真实总延迟，使自动优选更精准
unified-delay: true

# --- 状态持久化记忆 ---
profile:
  store-selected: true # 记忆你手动切换的节点，重启软件后不会复位
  store-fake-ip: true  # 记忆 DNS 缓存，重启后网络秒连，减少白屏等待时间

# --- Geo 数据库自动更新 ---
geo-auto-update: true
geo-update-interval: 24 # 每 24 小时（一天）自动更新一次GEO数据库（IP库和域名库），确保中越分流极致准确

# --- TCP 并发与嗅探 ---
tcp-concurrent: true # 开启 TCP 并发：测速或建立新连接时多路齐发，谁快用谁，大幅降低延迟感
sniffer:
  enable: true
  parse-pure-ip: true # 解决部分 App（如 Netflix）直连 IP 导致分流规则失效的问题
  sniff:
    HTTP:
      ports: [80, 8080-8880]
      override-destination: true
    TLS:
      ports: [443, 8443]
    QUIC:
      ports: [443, 8443]

# --- TUN 模式 (虚拟网卡) ---
# 注意：开启开关由软件界面控制，这里的参数决定了开启 TUN 后的工作模式
tun:
  stack: mixed # 使用混合协议栈 (Mixed)，结合系统与 gvisor 优势，处理本地转发更优秀
  auto-route: true # 自动设置全局路由，接管所有流量
  auto-detect-interface: true # 自动检测出口网卡

# ================= 1. DNS 解析配置 =================
dns:
  enable: true
  listen: 0.0.0.0:1053
  prefer-h3: true # 优先使用 HTTP/3 协议请求 DNS，并发更高、延迟更低
  respect-rules: true
  use-system-hosts: false
  cache-algorithm: arc
  enhanced-mode: fake-ip # 开启 Fake-IP 模式，极大提升网页首屏加载速度
  fake-ip-range: 198.18.0.1/16
  fake-ip-filter:
    # 过滤掉不需要走 Fake-IP 的本地或特定域名，防止网络图标报假错或本地登录失效
    - "+.lan"
    - "+.local"
    - "+.msftconnecttest.com"
    - "+.msftncsi.com"
    - "localhost.ptlogin2.qq.com"
    - "localhost.sec.qq.com"
    - "+.in-addr.arpa"
    - "+.ip6.arpa"
    - "time.*.com"
    - "time.*.gov"
    - "pool.ntp.org"
    - "localhost.work.weixin.qq.com"
  
  default-nameserver:
    - 223.5.5.5
    - 119.29.29.29
  
  # 主 DNS：负责国内及常规域名（解析快）
  nameserver:
    - https://223.5.5.5/dns-query # 阿里 DoH
    - https://doh.pub/dns-query   # 腾讯 DoH
  
  # 回退 DNS：当主 DNS 解析出海外 IP 时，用这里的安全 DNS 重新解析（防污染）
  fallback:
    - https://1.1.1.1/dns-query
    - https://8.8.8.8/dns-query
    - https://208.67.222.222/dns-query
  fallback-filter:
    geoip: true
    geoip-code: CN
    ipcidr:
      - 240.0.0.0/4
  
  # 指定代理服务器节点的解析 DNS
  proxy-server-nameserver:
    - https://223.5.5.5/dns-query
    - https://doh.pub/dns-query
  
  # 指定直连流量的解析 DNS
  direct-nameserver:
    - https://223.5.5.5/dns-query
    - https://doh.pub/dns-query
  
  # 针对特定域名的精确 DNS 策略
  nameserver-policy:
    "geosite:private,cn":
      - https://223.5.5.5/dns-query
      - https://doh.pub/dns-query

# ================= 2. 代理策略组配置 =================
