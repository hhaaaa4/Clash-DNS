# --- 统一延迟 (真延迟) ---
unified-delay: true

# --- 状态持久化记忆 ---
profile:
  store-selected: true 
  store-fake-ip: true  

# --- Geo 数据库自动更新 (24小时) ---
geo-auto-update: true
geo-update-interval: 24 

# --- TCP 并发与嗅探 ---
tcp-concurrent: true 
sniffer:
  enable: true
  parse-pure-ip: true 
  sniff:
    HTTP:
      ports: [80, 8080-8880]
      override-destination: true
    TLS:
      ports: [443, 8443]
    QUIC:
      ports: [443, 8443]

# --- TUN 模式参数保留 (由软件界面控制) ---
tun:
  stack: mixed 
  auto-route: true 
  auto-detect-interface: true 

# ================= 1. DNS 解析配置 =================
dns:
  enable: true
  listen: 0.0.0.0:1053
  prefer-h3: true 
  respect-rules: true
  use-system-hosts: false
  cache-algorithm: arc
  enhanced-mode: fake-ip 
  fake-ip-range: 198.18.0.1/16
  fake-ip-filter:
    - "+.lan"
    - "+.local"
    - "+.msftconnecttest.com"
    - "+.msftncsi.com"
    - "localhost.ptlogin2.qq.com"
    - "localhost.sec.qq.com"
    - "+.in-addr.arpa"
    - "+.ip6.arpa"
    - "time.*.com"
    - "time.*.gov"
    - "pool.ntp.org"
    - "localhost.work.weixin.qq.com"
  
  default-nameserver: [223.5.5.5, 119.29.29.29]
  nameserver:
    - https://223.5.5.5/dns-query 
    - https://doh.pub/dns-query   
  fallback:
    - https://1.1.1.1/dns-query
    - https://8.8.8.8/dns-query
  fallback-filter:
    geoip: true
    geoip-code: CN
  
  proxy-server-nameserver: [https://223.5.5.5/dns-query]
  direct-nameserver: [https://223.5.5.5/dns-query]
  
  nameserver-policy:
    "geosite:private,cn": [https://223.5.5.5/dns-query, https://doh.pub/dns-query]

# ================= 2. 策略组配置 =================
proxy-groups:
  # --- 1. 总控入口 ---
  - name: 节点选择
    type: select
    proxies:
      - 自动选择
      - DIRECT 
      - 香港-自动
      - 香港节点
      - 台湾-自动
      - 台湾节点
      - 日本-自动
      - 日本节点
      - 新加坡-自动
      - 新加坡节点
      - 美国-自动
      - 美国节点
      - 韩国-自动
      - 韩国节点
      - 越南-自动
      - 越南节点
      - 中国-自动
