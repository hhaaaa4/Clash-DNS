# --- 统一延迟 (真延迟) ---
unified-delay: true

# --- 状态持久化记忆 ---
profile:
  store-selected: true 
  store-fake-ip: true  

# --- Geo 数据库自动更新 (24小时) ---
geo-auto-update: true
geo-update-interval: 24 

# --- TCP 并发与嗅探 ---
tcp-concurrent: true 
sniffer:
  enable: true
  parse-pure-ip: true 
  sniff:
    HTTP:
      ports: [80, 8080-8880]
      override-destination: true
    TLS:
      ports: [443, 8443]
    QUIC:
      ports: [443, 8443]

# --- TUN 模式参数保留 (开关由软件控制) ---
tun:
  stack: mixed 
  auto-route: true 
  auto-detect-interface: true 

# ================= 1. DNS 解析配置 =================
dns:
  enable: true
  listen: 0.0.0.0:1053
  prefer-h3: true 
  respect-rules: true
  use-system-hosts: false
  cache-algorithm: arc
  enhanced-mode: fake-ip 
  fake-ip-range: 198.18.0.1/16
  fake-ip-filter:
    - "+.lan"
    - "+.local"
    - "+.msftconnecttest.com"
    - "+.msftncsi.com"
    - "localhost.ptlogin2.qq.com"
    - "localhost.sec.qq.com"
    - "+.in-addr.arpa"
    - "+.ip6.arpa"
    - "time.*.com"
    - "time.*.gov"
    - "pool.ntp.org"
    - "localhost.work.weixin.qq.com"
  
  default-nameserver:
    - 223.5.5.5
    - 119.29.29.29
  
  nameserver:
    - https://223.5.5.5/dns-query 
    - https://doh.pub/dns-query   
  
  fallback:
    - https://1.1.1.1/dns-query
    - https://8.8.8.8/dns-query
  fallback-filter:
    geoip: true
    geoip-code: CN
  
  proxy-server-nameserver:
    - https://223.5.5.5/dns-query
  direct-nameserver:
    - https://223.5.5.5/dns-query

# ================= 2. 代理策略组配置 =================
proxy-groups:
  # --- 1. 核心入口区 ---
  - name: 节点选择
    type: select
    proxies:
      - 自动选择
      - DIRECT 
      - 香港-自动
      - 香港节点
      - 台湾-自动
      - 台湾节点
      - 日本-自动
      - 日本节点
      - 新加坡-自动
      - 新加坡节点
      - 美国-自动
      - 美国节点
      - 韩国-自动
      - 韩国节点
      - 越南-自动
      - 越南节点
    icon: "https://testingcf.jsdelivr.net/gh/clash-verge-rev/clash-verge-rev.github.io@main/docs/assets/icons/adjust.svg"

  # --- 2. 越南服务：保留新加坡作为东南亚备份 ---
  - name: 越南服务
    type: select
    proxies:
      - DIRECT
      - 越南-自动
      - 越南节点
      - 新加坡-自动
      - 新加坡节点
    icon: "https://flagcdn.com/w320/vn.png" 

  # --- 3. 国内服务 ---
  - name: 国内服务
    type: select
    proxies:
      - DIRECT
      - 中国-自动
      - 中国节点
    icon: "https://flagcdn.com/w320/cn.png" 

  # --- 4. 漏网之鱼 ---
  - name: 漏网之鱼
    type: select
    proxies:
      - 节点选择
      - 自动选择
      - DIRECT
    icon: "https://testingcf.jsdelivr.net/gh/clash-verge-rev/clash-verge-rev.github.io@main/docs/assets/icons/fish.svg"

  # --- 5. 媒体与分类服务 (仅包含组) ---
  - name: 谷歌服务
    type: select
    proxies: [节点选择, 自动选择, 越南服务, DIRECT]
    icon: "https://testingcf.jsdelivr.net/gh/clash-verge-rev/clash-verge-rev.github.io@main/docs/assets/icons/google.svg"

  - name: YouTube
    type: select
    proxies: [自动选择, 节点选择, 越南服务, 香港-自动, 美国-自动, DIRECT]
    icon: "https://testingcf.jsdelivr.net/gh/clash-verge-rev/clash-verge-rev.github.io@main/docs/assets/icons/youtube.svg"

  - name: Netflix
    type: select
    proxies: [自动选择, 节点选择, 越南服务, 美国-自动, 香港-自动, DIRECT]
    icon: "https://testingcf.jsdelivr.net/gh/xiaolin-007/clash@main/icon/netflix.svg"

  - name: AI
    type: select
    proxies: [美国-自动, 美国节点, 自动选择, 节点选择]
    icon: "https://testingcf.jsdelivr.net/gh/clash-verge-rev/clash-verge-rev.github.io@main/docs/assets/icons/chatgpt.svg"

  - name: 电报消息
    type: select
    proxies: [节点选择, 自动选择, 越南服务, 香港-自动, DIRECT]
    icon: "https://testingcf.jsdelivr.net/gh/clash-verge-rev/clash-verge-rev.github.io@main/docs/assets/icons/telegram.svg"

  - name: 微软服务
    type: select
    proxies: [DIRECT, 节点选择]
    icon: "https://testingcf.jsdelivr.net/gh/clash-verge-rev/clash-verge-rev.github.io@main/docs/assets/icons/microsoft.svg"

  - name: 苹果服务
    type: select
    proxies: [节点选择, 自动选择, DIRECT]
    icon: "https://testingcf.jsdelivr.net/gh/clash-verge-rev/clash-verge-rev.github.io@main/docs/assets/icons/apple.svg"

  - name: 动画疯
    type: select
    proxies: [台湾-自动, 台湾节点, 节点选择]
    icon: "https://testingcf.jsdelivr.net/gh/xiaolin-007/clash@main/icon/Bahamut.svg"

  - name: 哔哩哔哩港澳台
    type: select
    proxies: [DIRECT, 香港-自动, 香港节点, 台湾-自动, 台湾节点, 节点选择]
    icon: "https://testingcf.jsdelivr.net/gh/xiaolin-007/clash@main/icon/bilibili.svg"

  - name: Spotify
    type: select
    proxies: [自动选择, 节点选择, 越南服务, DIRECT]
    icon: "https://testingcf.jsdelivr.net/gh/xiaolin-007/clash@main/icon/spotify.svg"

  # --- 6. 功能组 ---
  - name: 广告过滤
    type: select
    proxies: [REJECT, DIRECT]
    icon: "https://testingcf.jsdelivr.net/gh/clash-verge-rev/clash-verge-rev.github.io@main/docs/assets/icons/bug.svg"

  - name: 全局直连
    type: select
    proxies: [DIRECT]
    icon: "https://testingcf.jsdelivr.net/gh/clash-verge-rev/clash-verge-rev.github.io@main/docs/assets/icons/link.svg"

  # --- 7. 底层隐藏组 ---
  - name: 自动选择
    type: url-test
    interval: 120
    tolerance: 50
    hidden: true
    include-all: true
    filter: "^(?!.*(官网|套餐|流量|异常|剩余|到期|过期|更新|联系|群|VIP)).*$"
    icon: "https://testingcf.jsdelivr.net/gh/clash-verge-rev/clash-verge-rev.github.io@main/docs/assets/icons/speed.svg"

