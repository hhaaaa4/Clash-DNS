# ===================================================
# 核心引擎设置 (基于 Mihomo 内核的高性能配置)
# ===================================================
bind-address: "0.0.0.0"        # 监听所有网卡地址
mixed-port: 7890               # 混合端口，支持 HTTP/SOCKS
unified-delay: true            # 统一延迟计算（包含握手时间，反映真实体感延迟）
find-process-mode: strict      # 严格进程匹配，确保应用级分流准确（如 Zalo/Grab）
global-client-fingerprint: random # 降低被网站防火墙拦截的几率

# TUN 模式：接管系统全局流量（让不支持代理的应用如 Zalo 也能过分流）
tun:
  stack: mixed
  strict-route: true           # 严格路由，防止流量泄露
  dns-hijack: ["any:53", "tcp://any:53"] # 劫持 DNS 请求到代理内核处理
  auto-route: true             # 自动设置系统路由
  auto-detect-interface: true  # 自动检测活动网卡

# DNS 配置：解决 DNS 污染，提升域名解析速度
dns:
  enable: true
  enhanced-mode: fake-ip       # 采用 Fake-IP 模式，实现极致的秒开体验
  fake-ip-range: 198.18.0.1/16
  respect-rules: true          # 优先匹配规则，再发起 DNS 查询（节省流量并防泄露）
  nameserver:
    - https://223.5.5.5/dns-query # 阿里 DoH，国内域名首选
    - https://doh.pub/dns-query   # 腾讯 DoH
  proxy-server-nameserver:      # 代理节点的 DNS 服务器
    - https://223.5.5.5/dns-query
    - https://doh.pub/dns-query

# 流量嗅探：在 Fake-IP 模式下准确识别目标域名
sniffer:
  enable: true
  parse-pure-ip: true
  sniff:
    HTTP: {ports: [80, 8080-8880], override-destination: true}
    TLS: {ports: [443, 8443]}
    QUIC: {ports: [443, 8443]}

# ===================================================
# 代理节点获取 (Subscription)
# ===================================================
NodeParam: &NodeParam {type: http, interval: 86400, health-check: {enable: true, url: 'https://www.gstatic.com/generate_204', interval: 300}}

# ===================================================
# 节点过滤正则表达式 (用于将机场节点按国家分类)
# ===================================================
# 匹配越南节点：Zalo 和本地银行必备
FilterVN: &FilterVN '^(?=.*?(?i)(vietnam|VN|vn|越南)).*(?<!(?i)(回国|过期|剩余|官网|规则)).*$'
# 匹配美国节点：AI 访问专用（ChatGPT/Claude）
FilterUS: &FilterUS '^(?=.*?(?i)(United States|America|\bUS\b|美国)).*(?<!(?i)(回国|过期|剩余|官网)).*$'
# 匹配香港/新加坡节点：距离越南近，延迟极低
FilterHK: &FilterHK '^(?=.*?(?i)(\bHK\b|Hong.?Kong|香港)).*(?<!(?i)(回国|过期|剩余|官网)).*$'
FilterSG: &FilterSG '^(?=.*?(?i)(Singapore|\bSG\b|新加坡)).*(?<!(?i)(回国|过期|剩余|官网)).*$'
# 过滤掉流量、过期提醒等干扰节点
FilterAll: &FilterAll '^(?!.*?(?i)(流量|重置|剩余|到期|时间|频道)).*$'

# ===================================================
# 策略组逻辑 (你最常操作的部分)
# ===================================================
proxy-groups:
  - {name: 🚀 节点选择, type: select, filter: *FilterAll, include-all: true}
  - {name: ♻️ 自动选择, type: url-test, filter: *FilterAll, include-all: true, interval: 300, tolerance: 50}

  # 1. 【🇻🇳 越南服务】
  - name: 🇻🇳 越南服务
    type: select
    proxies: [直连, ♻️ 越南自动, 🇻🇳 越南节点, 🚀 节点选择]

  # 2. 【🤖 人工智能】：针对 ChatGPT / Vertex AI / OpenClaw
  # 采用 Fallback 故障转移模式：主选美国，美国挂了自动切备选，防止 API 调用中断。
  - name: 🤖 人工智能
    type: fallback
    proxies: [🔯 美国故转, ♻️ 狮城自动, 🚀 节点选择]
    url: 'https://www.gstatic.com/generate_204'
    interval: 300

  # 3. 【分流应用组】
  - {name: ✈️ Telegram, type: select, proxies: [♻️ 自动选择, 🌐 全部节点, 🚀 节点选择]}
  - {name: 📹 YouTube, type: select, proxies: [♻️ 自动选择, 🚀 节点选择]}
  - {name: 🎵 TikTok, type: select, proxies: [♻️ 越南自动, ♻️ 狮城自动, 🚀 节点选择]}
  - {name: 🎮 Steam, type: select, proxies: [直连, 🚀 节点选择, ♻️ 自动选择]} # 默认直连节省流量
  - {name: 🐟 漏网之鱼, type: select, proxies: [🚀 节点选择, ♻️ 自动选择, 直连]} # 未匹配到的流量处理

  # --- 地区高可用 (隐藏测速过程，只留结果供上面引用) ---
  - {name: ♻️ 越南自动, type: url-test, filter: *FilterVN, hidden: true, include-all: true}
  - {name: ♻️ 狮城自动, type: url-test, filter: *FilterSG, hidden: true, include-all: true}
  - {name: 🔯 美国故转, type: fallback, filter: *FilterUS, include-all: true}

# ===================================================
# 匹配规则 (从上至下依次判定)
# ===================================================
rules:
  # 0. 基础保障
  - DST-PORT,123,直连                           # NTP 时间同步走直连，防止时间错乱
  # 阻断 QUIC：越南宽带环境下 UDP 443 常被限速，强迫 Google/YT 走 TCP 可显著提升流畅度
  - AND,((NETWORK,UDP),(DST-PORT,443),(GEOSITE,youtube|google)),REJECT

  # 1. 越南专属分流 (确保 Zalo / Grab / 银行 / 仓库系统 走正确路径)
  - DOMAIN-SUFFIX,vn,🇻🇳 越南服务               # 匹配所有 .vn 域名
  - DOMAIN-KEYWORD,zalo,🇻🇳 越南服务             # Zalo 关键字
  - DOMAIN-SUFFIX,zalo.me,🇻🇳 越南服务
  - DOMAIN-KEYWORD,shopee,🇻🇳 越南服务           # 虾皮购物
  - DOMAIN-KEYWORD,vietcombank,🇻🇳 越南服务       # 越南外贸银行
  - DOMAIN-KEYWORD,techcombank,🇻🇳 越南服务       # 越南科技及商业股份银行
  - DOMAIN-KEYWORD,tpbank,🇻🇳 越南服务            # TPBank
  - PROCESS-NAME,com.zing.zalo,🇻🇳 越南服务      # Zalo App 进程
  - PROCESS-NAME,com.grabtaxi.passenger,🇻🇳 越南服务 # Grab App 进程

  # 2. 高频应用进程 (基于进程分流，性能最高)
  - PROCESS-NAME,org.telegram.group,✈️ Telegram
  - PROCESS-NAME,com.openai.chatgpt,🤖 人工智能
  - PROCESS-NAME,com.ss.android.ugc.trill,🎵 TikTok

  # 3. 规则集 (Rule Providers - 基于高效的 .mrs 格式)
  - RULE-SET,ai_domain,🤖 人工智能
  - RULE-SET,youtube_domain,📹 YouTube
  - RULE-SET,google_domain,🚀 节点选择
  - RULE-SET,telegram_domain,✈️ Telegram
  - RULE-SET,steam_domain,🎮 Steam
  - RULE-SET,cn_domain,直连                      # 中国境内域名
  - RULE-SET,cn_ip,直连,no-resolve               # 中国境内 IP 段

  # 4. 最终兜底：如果不符合上述所有规则，走“漏网之鱼”策略
  - MATCH,🐟 漏网之鱼
