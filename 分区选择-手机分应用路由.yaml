# ===================================================
# 规则匹配 (从上到下执行，命中即停止)
# ===================================================
rules:
  # --- 0. 基础网络优化规则 ---
  # NTP 时间同步走直连 (防止 Fake-IP 导致时间无法校准)
  - DST-PORT,123,全局直连
  # 【阻断 QUIC】防止 Youtube/Google 走 UDP 协议导致在越南网络下卡顿/断流
  - AND,((NETWORK,UDP),(DST-PORT,443),(GEOSITE,youtube|google)),REJECT
  - DOMAIN-KEYWORD,jspoo,全局直连

  # --- 1. 🇻🇳 越南专属服务 (分流到越南组) ---
  # 包含 Zalo, Zalopay, Grab, Shopee VN, 以及主流越南银行
  - PROCESS-NAME,com.zing.zalo,🇻🇳 越南服务
  - PROCESS-NAME,vn.com.vng.zalopay,🇻🇳 越南服务
  - PROCESS-NAME,com.grabtaxi.passenger,🇻🇳 越南服务
  - PROCESS-NAME,com.shopee.vn,🇻🇳 越南服务
  - DOMAIN-SUFFIX,zalo.me,🇻🇳 越南服务
  - DOMAIN-SUFFIX,zing.vn,🇻🇳 越南服务
  - DOMAIN-KEYWORD,momo.vn,🇻🇳 越南服务
  - DOMAIN-KEYWORD,zalopay,🇻🇳 越南服务
  - DOMAIN-KEYWORD,vietcombank,🇻🇳 越南服务
  - DOMAIN-KEYWORD,tpbank,🇻🇳 越南服务
  - DOMAIN-KEYWORD,techcombank,🇻🇳 越南服务
  - DOMAIN-SUFFIX,gov.vn,🇻🇳 越南服务

  # --- 2. 游戏/应用进程精确匹配 ---
  # Steam/Epic 走各自的策略组 (默认直连)
  - PROCESS-NAME,com.valvesoftware.android.steam.community,🎮 Steam
  - DOMAIN-KEYWORD,steam,🎮 Steam
  - PROCESS-NAME,com.epicgames.portal,🎮 Epic
  - DOMAIN-KEYWORD,epic,🎮 Epic
  - DOMAIN-SUFFIX,unrealengine.com,🎮 Epic
  - DOMAIN-SUFFIX,helpshift.com,🎮 Epic
  - DOMAIN-SUFFIX,eos-v2.org,🎮 Epic
  # Google 全家桶 -> 谷歌服务
  - PROCESS-NAME,com.android.vending,🔍 谷歌服务
  - PROCESS-NAME,com.google.android.apps.maps,🔍 谷歌服务
  - PROCESS-NAME,com.google.android.gm,🔍 谷歌服务
  - PROCESS-NAME,com.google.android.googlequicksearchbox,🔍 谷歌服务
