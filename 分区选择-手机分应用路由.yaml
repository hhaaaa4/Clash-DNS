# --- 基础设置 ---
ipv6: false           # 【推荐关闭】防止 IPv6 路由绕路导致网速慢，也防止 IPv6 泄露真实物理位置
allow-lan: true       # 允许局域网设备（如手机、iPad）连接此电脑的代理
mixed-port: 7890      # 混合端口（HTTP/SOCKS5 都在这一个端口），方便配置
unified-delay: true   # 统一延迟计算方式，去除握手时间，显示的延迟更真实
tcp-concurrent: true  # 开启 TCP 并发，连接建立更快
external-controller: 127.0.0.1:9090 # dashboard 管理面板地址
keep-alive-interval: 15 # 【防断连】每15秒发送心跳包，防止 Telegram/微信 等长连接应用消息延迟

# --- GEO 数据库自动更新 (精准判断 IP 归属地) ---
geodata-mode: true
geo-auto-update: true
geo-update-interval: 24 # 每24小时更新一次 IP 库
geox-url:
  # 使用 CDN 加速下载 IP 数据库，防止国内更新失败
  geoip: https://fastly.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@release/geoip.dat
  geosite: https://fastly.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@release/geosite.dat
  mmdb: https://fastly.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@release/geoip.metadb

# --- 进程匹配模式 ---
find-process-mode: strict
global-client-fingerprint: chrome # 模拟 Chrome 浏览器的指纹，防止被某些网站识别为爬虫

# ===================================================
# 核心：DNS 配置 (决定了访问速度和是否泄露)
# ===================================================
dns:
  enable: true
  listen: 0.0.0.0:1053  # DNS 监听端口
  ipv6: false           # DNS 层面也禁用 IPv6
  
  # 默认 DNS (当没有任何规则匹配时使用)
  default-nameserver:
    - 223.5.5.5       # 阿里 DNS
    - 119.29.29.29    # 腾讯 DNS
    - 1.1.1.1         # Cloudflare (国外备用)
    - 8.8.8.8         # Google (国外备用)
  
  enhanced-mode: fake-ip  # 【关键】Fake-IP 模式，极大提升加载速度，解决 DNS 污染
  fake-ip-range: 198.18.0.1/16
  use-hosts: true
  
  # Fake-IP 过滤列表 (这些域名必须解析真实 IP，否则无法联网或报错)
  fake-ip-filter:
    - +.lan
    - +.local
    - +.msftconnecttest.com # Windows 网络连接探测
    - +.msftncsi.com
    - localhost.ptlogin2.qq.com # QQ 登录相关
    - localhost.sec.qq.com
    - +.in-addr.arpa
    - +.ip6.arpa
    - time.*.com      # 时间同步服务器
    - ntp.*.com
    - +.market.xiaomi.com
    - time.*.gov
    - pool.ntp.org
    - localhost.work.weixin.qq.com # 企业微信本地服务
    - +.gov.vn        # 【越南专属】防止越南政府网站 DNS 解析问题

  # 【核心逻辑】DNS 分流策略
  # 作用：国内域名走国内 DNS，国外域名走代理 DNS。
  # 效果：在中国访问淘宝极快；在越南访问淘宝，也会解析到最近的 CDN 节点，同样快。
  nameserver-policy:
    "geosite:private,cn":  # 匹配到国内域名
      - https://223.5.5.5/dns-query  # 强制走阿里 DoH
      - https://doh.pub/dns-query    # 强制走腾讯 DoH
  
  # 国外域名使用的 DNS (通过代理节点去请求)
  nameserver:
    - https://1.1.1.1/dns-query
    - https://8.8.8.8/dns-query
  
  # 故障回退 DNS (当上面的都挂了时使用)
  fallback:
    - https://208.67.222.222/dns-query
    - https://1.0.0.1/dns-query
  fallback-filter:
    geoip: true
    ipcidr:
      - 240.0.0.0/4
  
  respect-rules: true # 遵循规则列表的分流结果

  # 代理节点本身的域名解析 (防止节点域名被污染导致连不上)
  proxy-server-nameserver:
    - https://223.5.5.5/dns-query
    - https://doh.pub/dns-query

# ===================================================
# 嗅探配置 (解决 DNS 污染和精准分流)
# ===================================================
sniffer:
  enable: true
  parse-pure-ip: true   # 即使应用只请求 IP，也尝试反查域名进行分流
  force-dns-mapping: true
  override-destination: false
  
  # 嗅探协议
  sniff:
    HTTP:
      ports: [80, 8080]
      override-destination: true
    TLS:
      ports: [443, 8443]
    QUIC:
      ports: [443, 8443]
  
  # 跳过嗅探的域名 (防止苹果推送延迟)
  skip-domain:
    - "Mijia Cloud"
    - "+.push.apple.com"
  
  # 【关键】跳过嗅探的 IP 段 (主要是 Telegram)
  # 作用：防止 Clash 强行嗅探 TG 的加密流量，导致 TG 消息转圈、卡顿、图片加载慢。
  skip-dst-address:
    - 91.108.4.0/22
    - 91.108.8.0/21
    - 91.108.16.0/21
    - 91.108.56.0/22
    - 149.154.160.0/20
    - 149.154.164.0/22

# --- TUN 模式 (虚拟网卡，接管所有系统流量) ---
tun:
  enable: true
  stack: mixed  # 混合模式，兼容性最好
  mtu: 1500
  dns-hijack:
    - any:53    # 劫持所有 DNS 请求，防止泄露
  auto-route: true  # 自动配置路由表
  auto-detect-interface: true # 自动检测出口网卡

# ===================================================
# 代理组配置 (策略组)
# ===================================================
proxy-groups:
  # 1. 【主节点选择】
  # 默认优选新加坡 (SG)，物理距离越南近，延迟低，且大部分服务不限区。
  - name: 🚀 节点选择
    type: select
    interval: 300
    timeout: 3000
    max-failed-times: 3
    lazy: true
    proxies:
      - SG AUTO
      - SG
      - HK AUTO
      - HK
      - VN AUTO
      - VN
      - TW AUTO
      - TW
      - JP AUTO
      - JP
      - US AUTO
      - US
      - 故障转移
      - 全局直连
      - 冷门
    url: https://www.gstatic.com/generate_204
    icon: https://fastly.jsdelivr.net/gh/clash-verge-rev/clash-verge-rev.github.io@main/docs/assets/icons/adjust.svg

  # 2. 自动故障转移 (给其他策略组做垫底，防止断网)
  - name: 故障转移
    type: fallback
    interval: 300
    timeout: 3000
    max-failed-times: 3
    lazy: false
    include-all: true
    filter: "^(?!.*(官网|套餐|流量|异常|剩余|问题|证书)).*$" # 过滤掉无效节点
    url: https://www.gstatic.com/generate_204
    icon: https://fastly.jsdelivr.net/gh/clash-verge-rev/clash-verge-rev.github.io@main/docs/assets/icons/ambulance.svg

  # 3. 【越南服务专属组】 (Zalo, Grab, 越南银行, Shopee VN)
  # 策略：默认 VN (越南节点)。
  # 场景A (在中国)：必须走 VN 节点，否则 Zalo 登不上，Grab 无法验证。
  # 场景B (在越南)：默认走 VN 节点 (加速)。如果遇到银行 App 查 IP 导致封号，
  #                手动切换此组到 -> [全局直连] 即可，无需改代码。
  - name: 🇻🇳 越南服务
    type: select
    interval: 300
    timeout: 3000
    max-failed-times: 3
    lazy: true
    proxies:
      - VN AUTO
      - VN
      - 全局直连         # 👈 在越南本地需要真实 IP 时点这个
      - SG AUTO          # 新加坡是越南的最佳备选
      - SG
      - HK AUTO
      - HK
      - 故障转移
      - TW AUTO
      - TW
      - JP AUTO
      - JP
      - US AUTO
      - US
      - 冷门
