# --- 9. 最优路由规则 (网络交警：从上到下严格匹配，命中了就放行) ---
rules:
  # 【网络防卡顿优化】
  - DST-PORT,123,🔗 全局直连                                      # NTP 时间同步请求必须直连，否则电脑/手机时间会错乱
  - AND,((NETWORK,UDP),(DST-PORT,443),(GEOSITE,youtube|google)),REJECT # 阻断 QUIC，防止 YouTube 在越南或跨国网络下强走 UDP 导致视频缓冲转圈
  - DOMAIN-KEYWORD,jspoo,🔗 全局直连

  # 【第一层：黑洞拦截】垃圾探测流量直接扔进垃圾桶，节约手机/电脑性能
  - IP-CIDR,169.254.169.254/32,REJECT,no-resolve  
  - DST-PORT,11434,REJECT                         
  - DOMAIN,t-ring-fdv2.msedge.net,REJECT,no-resolve 
  - RULE-SET,reject,🛡️ 广告过滤
  
  # 【第二层：系统 DNS 与 内网放行】查国内域名的请求直接出海关
  - IP-CIDR,223.5.5.5/32,🔗 全局直连,no-resolve
  - IP-CIDR,223.6.6.6/32,🔗 全局直连,no-resolve
  - RULE-SET,private_ip,🔗 全局直连,no-resolve           
  - RULE-SET,private_domain,🔗 全局直连
  
  # 【第三层：大流量下载服务直连】测速网站和苹果服务(AppStore下载)直连，跑满宽带
  - RULE-SET,speedtest_domain,🔗 全局直连                
  - RULE-SET,apple_domain,🍎 苹果服务                    
  - RULE-SET,apple_ip,🍎 苹果服务,no-resolve
  
  # 【第四层：游戏平台精准包名与域名】强行直连，防止游戏大更新把你的机场流量耗干
