  - PROCESS-NAME,com.ss.android.ugc.trill,🎵 TikTok
  - PROCESS-NAME,com.zhiliaoapp.musically,🎵 TikTok
  - PROCESS-NAME,com.rezvorck.tiktokplugin,🎵 TikTok
  
  - PROCESS-NAME,org.telegram.group,📲 电报消息

  # 【第七层：Rule-Set 规则集域名/IP匹配】对应电脑端软件或包名没有覆盖到的剩余流量
  - RULE-SET,BilibiliHMT,📺 哔哩哔哩港澳台
  - RULE-SET,TikTok,🎵 TikTok
  - RULE-SET,ai_domain,🤖 AI
  - RULE-SET,onedrive_domain,Ⓜ️ 微软服务
  - RULE-SET,microsoft_domain,Ⓜ️ 微软服务
  - RULE-SET,telegram_ip,📲 电报消息,no-resolve  # no-resolve: 遇到 IP 规则不反查域名，速度大幅提升
  - RULE-SET,telegram_domain,📲 电报消息
  - RULE-SET,youtube_domain,▶️ YouTube
  - RULE-SET,google_domain,🔍 谷歌服务
  - RULE-SET,google_ip,🔍 谷歌服务,no-resolve
  - DOMAIN,v2rayse.com,🚀 节点选择
  
  # 【第八层：国内全量规则兜底】只要是国内的网站或 IP，一律走直连
  - RULE-SET,cn_domain,🔗 全局直连
  - RULE-SET,cn_ip,🔗 全局直连,no-resolve
  
  # 【第九层：绝对兜底】上面所有条件都没命中的杂乱流量
  - RULE-SET,geolocation-!cn_domain,🚀 节点选择   # 只要不在中国数据库里，统统扔给节点代理
  - MATCH,🐟 漏网之鱼                             # 最后未知的“黑户”流量，丢给漏网之鱼组

# --- 10. 规则集定义与拉取 (.mrs极速二进制内核) ---
# 格式模板定义 (方便下面直接引用)
RuleSet_domain_yaml: &RuleSet_domain_yaml {type: http, behavior: domain, interval: 43200, format: yaml}
RuleSet_classical_yaml: &RuleSet_classical_yaml {type: http, behavior: classical, interval: 43200, format: yaml}
RuleSet_domain_mrs: &RuleSet_domain_mrs {type: http, behavior: domain, interval: 43200, format: mrs} # MRS 是极速二进制格式，内存占用极低
RuleSet_ipcidr_mrs: &RuleSet_ipcidr_mrs {type: http, behavior: ipcidr, interval: 43200, format: mrs}

rule-providers:
  # ==========================================================
  # 保留特定的文本规则库 (适用于细分 APP)
  # ==========================================================
  reject:
    <<: *RuleSet_domain_yaml
    url: "https://fastly.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/reject.txt"
    path: "./rule-providers/reject.yaml"
  BilibiliHMT:
    <<: *RuleSet_classical_yaml
    url: "https://fastly.jsdelivr.net/gh/xiaolin-007/clash@main/rule/BilibiliHMT.txt"
    path: "./rule-providers/BilibiliHMT.yaml"
  TikTok:
    <<: *RuleSet_classical_yaml
    url: "https://fastly.jsdelivr.net/gh/xiaolin-007/clash@main/rule/TikTok.txt"
    path: "./rule-providers/TikTok.yaml"
  
  # Fake-IP 必须的放行黑名单库
  fakeipfilter:
    <<: *RuleSet_domain_yaml
    url: "https://raw.githubusercontent.com/juewuy/ShellCrash/refs/heads/dev/public/fake_ip_filter.list"
    path: ./rule-providers/fakeipfilter.list

  # ==========================================================
  # 核心大库全面采用 MetaCubeX 的 .mrs 二进制规则
