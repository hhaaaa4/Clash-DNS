  - {name: 越南-自动, <<: *UrlTest, filter: *FilterVN}

# --- 11. 最优路由规则 (网络交警：从上到下严格匹配，命中了就放行) ---
rules:
  # 【第一层：黑洞拦截】垃圾探测流量直接扔进垃圾桶，节约电脑资源
  - IP-CIDR,169.254.169.254/32,REJECT,no-resolve  
  - DST-PORT,11434,REJECT                         
  - DOMAIN,t-ring-fdv2.msedge.net,REJECT,no-resolve 
  - RULE-SET,reject,🛡️ 广告过滤                   # 引入去广告模块
  
  # 【第二层：系统 DNS 放行】查国内域名的请求直接出海关
  - IP-CIDR,223.5.5.5/32,🔗 全局直连,no-resolve
  - IP-CIDR,223.6.6.6/32,🔗 全局直连,no-resolve
  
  # 【第三层：局域网放行】路由器、NAS、打印机等本地设备直连
  # ⚠️ 性能秘籍：后缀加了 `no-resolve` 表示遇到 IP 规则不要费时间去反查域名，直接判断 IP 就行，能大幅提升速度
  - RULE-SET,private_ip,🔗 全局直连,no-resolve           
  - RULE-SET,private_domain,🔗 全局直连
  
  # 【第四层：高频与大流量直连】测速网站和苹果服务(AppStore下载)直连跑满宽带
  - RULE-SET,speedtest_domain,🔗 全局直连                
  - RULE-SET,apple_domain,🍎 苹果服务                    
  - RULE-SET,apple_ip,🍎 苹果服务,no-resolve
  
  # 【第五层：JS 核心移植 - 越南专区与精细化直连】
  - DOMAIN-SUFFIX,vn,🇻🇳 越南服务
  - DOMAIN-SUFFIX,zalo.me,🇻🇳 越南服务
  - DOMAIN-KEYWORD,zalo,🇻🇳 越南服务
  - DOMAIN-SUFFIX,shopee.vn,🇻🇳 越南服务
  - DOMAIN-SUFFIX,lazada.vn,🇻🇳 越南服务
  - DOMAIN-SUFFIX,zing.vn,🇻🇳 越南服务
  - DOMAIN-SUFFIX,vng.com.vn,🇻🇳 越南服务
  - DOMAIN-SUFFIX,tiktok.com.vn,🇻🇳 越南服务
  - DOMAIN-KEYWORD,jspoo,🔗 全局直连
  - DOMAIN,v2rayse.com,🚀 节点选择

  # 【第六层：精细化国外代理应用分流】匹配上哪个应用，就把它引导到对应的策略组里去
  - RULE-SET,BilibiliHMT,📺 哔哩哔哩港澳台
  - RULE-SET,TikTok,🎵 TikTok
  - RULE-SET,ai_domain,🤖 AI
  - RULE-SET,onedrive_domain,Ⓜ️ 微软服务
  - RULE-SET,microsoft_domain,Ⓜ️ 微软服务
  - RULE-SET,telegram_ip,📲 电报消息,no-resolve
  - RULE-SET,telegram_domain,📲 电报消息
  - RULE-SET,youtube_domain,▶️ YouTube
  - RULE-SET,google_domain,🔍 谷歌服务
  - RULE-SET,google_ip,🔍 谷歌服务,no-resolve
  
  # 【第七层：国内全量规则兜底】只要匹配上是中国国内的网站或 IP，一律走直连
  - RULE-SET,cn_domain,🔗 全局直连
  - RULE-SET,cn_ip,🔗 全局直连,no-resolve
  
  # 【第八层：绝对兜底】上面七层都没匹配到的流量
  - RULE-SET,geolocation-!cn_domain,🚀 节点选择   # 如果属于国外网站库，交给代理
  - MATCH,🐟 漏网之鱼                             # 最后未知的“黑户”流量，丢给漏网之鱼组

# --- 12. 规则集定义与拉取 (高性能组合版) ---
# 格式模板定义
RuleSet_domain_yaml: &RuleSet_domain_yaml {type: http, behavior: domain, interval: 43200, format: yaml}
RuleSet_classical_yaml: &RuleSet_classical_yaml {type: http, behavior: classical, interval: 43200, format: yaml}
RuleSet_domain_mrs: &RuleSet_domain_mrs {type: http, behavior: domain, interval: 43200, format: mrs} # MRS 是极速二进制格式
RuleSet_ipcidr_mrs: &RuleSet_ipcidr_mrs {type: http, behavior: ipcidr, interval: 43200, format: mrs}

rule-providers:
  # ==========================================================
  # 补充 1：引入原 JS 配置中的特定应用文本规则
  # ==========================================================
  reject:
    <<: *RuleSet_domain_yaml
    url: "https://fastly.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/reject.txt"
    path: "./rule-providers/reject.yaml"
  BilibiliHMT:
    <<: *RuleSet_classical_yaml
    url: "https://fastly.jsdelivr.net/gh/xiaolin-007/clash@main/rule/BilibiliHMT.txt"
    path: "./rule-providers/BilibiliHMT.yaml"
  TikTok:
    <<: *RuleSet_classical_yaml
    url: "https://fastly.jsdelivr.net/gh/xiaolin-007/clash@main/rule/TikTok.txt"
    path: "./rule-providers/TikTok.yaml"
  
  # ==========================================================
  # 补充 2：Fake-IP 必须的放行黑名单库
  # ==========================================================
  fakeipfilter:
    <<: *RuleSet_domain_yaml
    url: "https://raw.githubusercontent.com/juewuy/ShellCrash/refs/heads/dev/public/fake_ip_filter.list"
    path: ./rule-providers/fakeipfilter.list

  # ==========================================================
  # 核心提升：放弃臃肿文本，全面采用 MetaCubeX .mrs 极速二进制规则
  # 大幅降低内存占用，提升软件启动和匹配速度 (每 12 小时静默更新)
  # ==========================================================
  private_domain:
    <<: *RuleSet_domain_mrs
    url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/private.mrs"
    path: ./rule-providers/private_domain.mrs
  ai_domain:
    <<: *RuleSet_domain_mrs
    url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/category-ai-!cn.mrs"
    path: ./rule-providers/ai_domain.mrs
  youtube_domain:
    <<: *RuleSet_domain_mrs
    url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/youtube.mrs"
    path: ./rule-providers/youtube_domain.mrs
  google_domain:
    <<: *RuleSet_domain_mrs
    url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/google.mrs"
    path: ./rule-providers/google_domain.mrs
  telegram_domain:
    <<: *RuleSet_domain_mrs
    url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/telegram.mrs"
    path: ./rule-providers/telegram_domain.mrs
  onedrive_domain:
    <<: *RuleSet_domain_mrs
    url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/onedrive.mrs"
